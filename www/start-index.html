<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Start new order</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style1.css">
  <script src="start-index.js"></script>
</head>
<body>
  <div id="start-page" class="picker-app">
    <h1>Start an Order</h1>
    <div class="inline-warn">WARNN</div>
    <form onsubmit="validateForm(event)" action="/" class="start">
      <label for="data">Order ID*</label>
      <input type="number" id="user" name="user" required>
      <div class="after-id">
        <label for="name">Name*</label>
        <input type="text" id="name" name="name" disabled>
        <label for="picker">Picked by*</label>
        <div id="p-name">
          <input type="number" id="picker" name="picker" required value="">
          <span></span>
        </div>
        <button type="button" class="register-btn" onclick="openRegisterModal()">New Volunteer? Register Here</button>
        <div id="assist-box">
          <p onclick="addAssist()">Click to Add assistant IDs (optional)</option></p>
        </div>
        <div class="sides">
          <label><input type="radio" name="aisle" value="1">Row 1 (left)</label>
          <label><input type="radio" name="aisle" value="2">Row 2 (right)</label>
          <!-- label><input type="radio" name="aisle" value="3">Row3</label -->
        </div>
        <button type="submit">START</button>
      </div>
    </form>
  </div>

  <div id="register-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeRegisterModal()">&times;</span>
      <h2>Register Volunteer</h2>
      <div id="register-success" style="display: none; color: green; font-weight: bold; margin-bottom: 10px;">Successfully Registered!</div>
      <form id="register-form" onsubmit="submitRegister(event)">
        <label>Name*:</label> <input type="text" id="reg-name" required placeholder="First Last">
        <label>Phone*:</label> <input type="tel" id="reg-phone" required placeholder="2161234567">
        <label>Email*:</label> <input type="email" id="reg-email" required placeholder="user@email.com">
        <label>Age Range*:</label>
        <select id="reg-age" required>
          <option value="">Select Age</option>
          <option value="15">Under 20</option>
          <option value="20">20s</option>
          <option value="30">30s</option>
          <option value="40">40s</option>
          <option value="50">50s</option>
          <option value="60">60s</option>
          <option value="70">Over 70</option>
        </select>
        <button type="submit">Register</button>
      </form>
    </div>
  </div>
</body>
</html>
