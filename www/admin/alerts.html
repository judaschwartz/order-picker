<style>
  .alerts-header-wrapper {
    text-align: center;
    margin-bottom: 32px;
    padding: 0 16px;
  }
  .alerts-header-wrapper h2 {
    font-size: 28px;
    margin-bottom: 12px;
  }
  .alerts-header-wrapper p {
    color: var(--text-muted);
    font-size: 16px;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
  }
  
  #alerts-panel {
    background: var(--card-bg);
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    margin: 0 auto 40px auto;
    max-width: 800px;
  }

  .alerts-form-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  @media (min-width: 768px) {
    .alerts-form-grid {
      display: grid;
      grid-template-columns: 140px 1fr 160px;
      align-items: end;
    }
  }

  .alerts-form-grid .form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 0;
  }

  .alerts-form-grid .form-group label {
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-main);
    font-size: 14px;
  }

  .alerts-form-grid input {
    font-size: 20px;
    text-align: center;
    font-weight: bold;
    text-transform: uppercase;
    height: 48px;
  }

  .alerts-form-grid textarea {
    font-size: 16px;
    resize: none;
    height: 48px;
    padding-top: 12px; /* Center text vertically */
  }

  .alerts-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .alerts-actions button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 48px;
    font-size: 15px;
    margin: 0;
  }

  .btn-info {
    background-color: var(--primary);
  }
  .btn-info:hover {
    background-color: var(--primary-hover);
  }
  
  .btn-alert {
    background-color: var(--warning);
    color: #fff;
  }
  .btn-alert:hover {
    background-color: #d97706;
  }

  /* Target the table specifically to style the delete buttons */
  #table-alerts {
    margin-top: 24px;
  }
  #table-alerts td:first-child {
    color: var(--danger);
    cursor: pointer;
    text-align: center;
    font-size: 18px;
    transition: transform 0.2s, background-color 0.2s;
    border-radius: 6px;
    user-select: none;
  }
  #table-alerts td:first-child:hover {
    background-color: var(--danger-bg);
    transform: scale(1.1);
  }
  #table-alerts th:first-child {
    text-align: center;
  }
  /* Formatting for the ID badge */
  #table-alerts td:nth-child(2) {
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  
  /* Fix layout bugs with the alert banners appearing outside */
  body > div:not(.container):not(#alerts-panel):not(.alerts-header-wrapper):contains('added alert'),
  body > div:not(.container):not(#alerts-panel):not(.alerts-header-wrapper):contains('removed alert') {
      display: none;
  }
</style>

<div class="alerts-header-wrapper">
  <h2>Product Alerts</h2>
  <p>Set automated messages for specific items during the picking process. <strong>Add Info</strong> places subtle text next to the item name. <strong>Add Alert</strong> triggers a mandatory pop-up warning.</p>
</div>

<div id="alerts-panel">
  <form id="alerts-form" class="alerts-form-grid">
    <div class="form-group">
      <label for="prodId">Item ID</label>
      <input type="text" id="prodId" name="prodId" placeholder="e.g. A12" required />
    </div>
    
    <div class="form-group">
      <label for="itmAlert">Message</label>
      <textarea id="itmAlert" name="itmAlert" placeholder="e.g. Out of stock, replace with B4" required></textarea>
    </div>
    
    <div class="alerts-actions">
      <button type="button" class="btn-info" onclick="addProdAlert(false, this)">
        <span>ℹ️</span> Add Info
      </button>
      <button type="button" class="btn-alert" onclick="addProdAlert(true, this)">
        <span>⚠️</span> Add Alert
      </button>
    </div>
  </form>
</div>

<script>
  window.addEventListener('load', function() {
      // Specifically target the table generated by server.js (id="table-alerts")
    const table = document.getElementById('table-alerts');
    if (table) {
      table.querySelectorAll('tr:not(:first-child) td:first-child').forEach(e => {
        // Change text from generic server X to a nicer trash icon
        e.innerHTML = '🗑️'; 
        e.title = "Delete this alert";
        e.onclick = () => {
          customConfirm('Remove alert for item ' + e.nextSibling.innerText.replace('POP ', '') + '?', () => {
            url.searchParams.set('remove', e.nextSibling.innerText)
            window.location.href = url.href
          });
        }
      });
      
      // Highlight "POP" alerts with badges
      table.querySelectorAll('tr:not(:first-child) td:nth-child(2)').forEach(e => {
        const idText = e.innerText.trim();
        if(idText.includes('POP ')) {
          e.innerHTML = `<span style="background: var(--warning); color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 6px; display: inline-block; transform: translateY(-1px);">ALERT</span>` + idText.replace('POP ', '');
        } else {
          e.innerHTML = `<span style="background: var(--primary); color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 6px; display: inline-block; transform: translateY(-1px);">INFO</span>` + idText;
        }
      });
    }

    // Add enter key submission (defaults to Info)
    document.getElementById('alerts-form').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) {
        addProdAlert(false, document.querySelector('.btn-info'));
      }
    });
  })

  function addProdAlert(popup, btn) {
    const prodIdInput = document.querySelector('input[name="prodId"]');
    const itmAlertInput = document.querySelector('textarea[name="itmAlert"]');
    const prodId = prodIdInput.value.trim();
    const itmAlert = itmAlertInput.value.trim();
    
    let hasError = false;
    if (!prodId) {
      prodIdInput.classList.add('invalid-shake');
      setTimeout(() => prodIdInput.classList.remove('invalid-shake'), 400);
      hasError = true;
    }
    if (!itmAlert) {
      itmAlertInput.classList.add('invalid-shake');
      setTimeout(() => itmAlertInput.classList.remove('invalid-shake'), 400);
      hasError = true;
    }
    
    if (hasError) return;
    
    if (prodId && itmAlert) {
      // Show loading state
      if (btn) {
        const originalText = btn.innerHTML;
        btn.innerHTML = 'Saving...';
        btn.style.opacity = '0.7';
      }

      url.searchParams.set('prodId', `${popup ? 'POP ' : ''}${prodId.toUpperCase()}`)
      url.searchParams.set('itmAlert', itmAlert)
      window.location.href = url.href
    }
  }
</script>
