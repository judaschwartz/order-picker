<div class="admin-form" id="combo-container" style="max-width: 600px; margin: 0 auto 32px auto;">
  <h2>Block Order</h2>
  <div class="alert-banner warning" style="margin-bottom: 24px;">
    <strong>⚠️ Warning</strong>
    Blocked orders are completely hidden from pickers. Use this if an order was cancelled or needs to be held back temporarily.
  </div>
  <p class="info-text" style="text-align: center;">Search or enter the ID of the order you want to block below:</p>
  
  <form style="display: flex; gap: 16px; align-items: flex-end; justify-content: center; flex-wrap: wrap;">
    <input type="hidden" name="page" value="block" />
    <div class="form-group autocomplete" style="flex: 1; min-width: 200px; margin: 0; position: relative;">
      <label for="block" style="text-align: left;">Order ID</label>
      <input type="text" id="block" name="block" placeholder="e.g. 123" required style="font-size: 24px; text-align: center; height: 54px; font-weight: bold;" />
    </div>
    <button type="submit" class="btn-primary" style="height: 54px; min-width: 140px; font-size: 18px; margin: 0;">Block Order</button>
  </form>
</div>
